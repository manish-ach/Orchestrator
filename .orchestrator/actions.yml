# CI pipeline for this repo. The coordinator reads this file:
#  - on POST /api/pipelines/trigger (local checkout, no body)
#  - on a Forgejo push webhook (fetched from the pushed branch)
#
# Each job runs in a per-run workspace the executor clones automatically
# from REPO_URL@COMMIT_SHA (injected by the coordinator) — no checkout job
# needed. `artifacts:` paths are uploaded to the coordinator when the job
# passes and downloaded by jobs that `needs` them, even on other machines.
name: orchestrator-ci
stages:
  - build
  - test
  - package
jobs:
  build-info:
    stage: build
    image: alpine/git
    artifacts: [build-info.txt]
    script: git log -1 --oneline > build-info.txt && wc -l src/*.rs >> build-info.txt && cat build-info.txt
  validate-pipeline:
    stage: test
    image: alpine:latest
    script: test -f .orchestrator/actions.yml && echo "pipeline definition present"
  package:
    stage: package
    image: alpine:latest
    needs: [build-info, validate-pipeline]
    artifacts: [release.tar.gz]
    script: tar czf release.tar.gz build-info.txt .orchestrator && ls -lh release.tar.gz
