<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchestrator — Pipeline Detail</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <div>
          <div class="brand-name">Orchestrator</div>
          <div class="brand-sub">BUILD V0.1.0</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item active" href="index.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Pipelines
        </a>
        <a class="nav-item" href="#">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-foot">
        <div class="avatar"></div>
        <div>
          <div class="who-name"><span class="sk sk-line" style="width:84px"></span></div>
          <div class="who-role" style="margin-top:5px"><span class="sk sk-line" style="width:56px;height:10px"></span></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <a class="icon-btn" href="index.html" style="text-decoration:none">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <div class="topbar-title">Pipeline Dashboard</div>
        <div class="spacer"></div>
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          Search logs…
        </div>
        <div class="icon-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15"/></svg>
        </div>
        <div class="icon-btn">
          <span class="dot"></span>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
      </header>

      <main class="content">

        <!-- Run header: identity + status + actions. Data slots are skeletons. -->
        <div class="detail-head">
          <div class="detail-mark">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </div>
          <div>
            <div style="display:flex;align-items:center;gap:14px">
              <span class="sk sk-line" style="width:190px;height:20px"></span>
              <span class="sk sk-pill"></span>
            </div>
            <div class="detail-meta">
              <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg> <span class="sk sk-line" style="width:64px;height:10px"></span></span>
              <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg> <span class="sk sk-line" style="width:70px;height:10px"></span></span>
              <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span class="sk sk-line" style="width:60px;height:10px"></span></span>
            </div>
          </div>
          <div class="detail-actions">
            <span class="btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>
              Cancel
            </span>
            <span class="btn btn-dark">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg>
              Rerun
            </span>
          </div>
        </div>

        <div class="detail-grid">
          <!-- Stages list: structure only, skeleton content -->
          <div>
            <div class="section-label">Pipeline Stages</div>
            <div class="stage-list" id="stages"></div>
          </div>

          <!-- Log panel: terminal chrome, empty body -->
          <div>
            <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
              <span>Logs</span>
              <span style="display:flex;gap:14px">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a9a9a" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a9a9a" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
              </span>
            </div>
            <div class="term">
              <div class="term-bar plain"><span class="term-file">awaiting log stream</span></div>
              <div class="term-body" id="logskel"></div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Renders empty stage cards + skeleton log lines. No data. -->
  <script>
    const stages = document.getElementById('stages');
    for (let i = 0; i < 4; i++) {
      const card = document.createElement('div');
      card.className = 'stage-card' + (i === 1 ? ' selected' : '');
      card.innerHTML = `
        <div class="stage-top">
          <span class="sk" style="width:22px;height:22px;border-radius:50%"></span>
          <span class="stage-name"><span class="sk sk-line" style="width:110px"></span></span>
          <span class="sk sk-pill" style="width:70px"></span>
        </div>
        <div class="stage-bottom">
          <span class="sk sk-line" style="width:96px;height:10px"></span>
          <span class="sk sk-line" style="width:62px;height:10px"></span>
        </div>`;
      stages.appendChild(card);
    }

    const logskel = document.getElementById('logskel');
    const widths = [70, 52, 84, 44, 66, 58, 78];
    widths.forEach((w, i) => {
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `<span class="log-num">${i + 1}</span><span class="sk sk-chip log-skel" style="max-width:${w}%"></span>`;
      logskel.appendChild(row);
    });
  </script>
</body>
</html>
