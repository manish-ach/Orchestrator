<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchestrator — Pipelines</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <div>
          <div class="brand-name">Orchestrator</div>
          <div class="brand-sub">BUILD V0.1.0</div>
        </div>
      </div>

      <nav class="nav">
        <a class="nav-item active" href="index.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Pipelines
        </a>
        <a class="nav-item" href="#">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-foot">
        <div class="avatar"></div>
        <div>
          <div class="who-name"><span class="sk sk-line" style="width:84px"></span></div>
          <div class="who-role" style="margin-top:5px"><span class="sk sk-line" style="width:56px;height:10px"></span></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-title">Pipeline Dashboard</div>
        <div class="crumb">
          <span class="crumb-divider">|</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          root/cluster
        </div>
        <div class="spacer"></div>
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          Search pipelines…
        </div>
        <div class="icon-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15"/></svg>
        </div>
        <div class="icon-btn">
          <span class="dot"></span>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
      </header>

      <main class="content">

        <!-- Stat cards: labels are chrome; values are empty (skeleton) -->
        <section class="stats">
          <div class="stat">
            <div>
              <div class="stat-label">TOTAL PIPELINES</div>
              <div class="stat-value-slot"><span class="sk sk-value"></span></div>
            </div>
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            </div>
          </div>
          <div class="stat">
            <div>
              <div class="stat-label">HEALTH SCORE</div>
              <div class="stat-value-slot"><span class="sk sk-value"></span></div>
            </div>
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
          </div>
          <div class="stat">
            <div>
              <div class="stat-label">ACTIVE RUNS</div>
              <div class="stat-value-slot"><span class="sk sk-value"></span></div>
            </div>
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8 7 17M17 7l2.8-2.8"/></svg>
            </div>
          </div>
        </section>

        <!-- Recent runs: column headers are chrome; rows are skeleton placeholders -->
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Recent Pipeline Runs</div>
            <div class="panel-actions">
              <span class="btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
                Filter
              </span>
              <span class="btn btn-dark">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                New Pipeline
              </span>
            </div>
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>Name</th><th>Branch</th><th>Status</th><th>Duration</th><th>Started At</th><th></th>
              </tr>
            </thead>
            <tbody id="rows"><!-- rows injected by skeleton script below --></tbody>
          </table>

          <div class="panel-foot">
            <div><span class="sk sk-line" style="width:150px"></span></div>
            <div class="pager">
              <span>‹</span>
              <span class="current">1</span>
              <span>›</span>
            </div>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- Renders empty skeleton rows only. No data, no fetching, no behaviour. -->
  <script>
    const tbody = document.getElementById('rows');
    for (let i = 0; i < 8; i++) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="cell-name"><span class="row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></span><span class="sk sk-line" style="width:140px"></span></div></td>
        <td><span class="sk sk-line" style="width:90px"></span></td>
        <td><span class="sk sk-pill"></span></td>
        <td><span class="sk sk-line" style="width:48px"></span></td>
        <td><span class="sk sk-line" style="width:74px"></span></td>
        <td><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbcbcb" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></td>`;
      tbody.appendChild(tr);
    }
  </script>
</body>
</html>
